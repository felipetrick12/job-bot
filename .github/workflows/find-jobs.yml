name: Find Remote Jobs

on:
  schedule:
    # Corre cada 6 horas (UTC). Cambia el cron si quieres otra frecuencia.
    - cron: "0 */6 * * *"
  workflow_dispatch:   # permite correrlo manualmente desde la pestaña Actions

# Permite que el workflow haga commit del archivo seen_jobs.json
permissions:
  contents: write

jobs:
  find-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job finder
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python find_jobs.py

      - name: Commit updated seen list
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs [skip ci]"
          git push
